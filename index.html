<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kliker Imperium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h1>Imperium Europy: <span id="country-name">Polska</span></h1>
        <h2 id="money">Pieniądze: 0 zł</h2>
        <h3 id="income-display">Zarobek: 0 zł/s</h3>
        
        <button id="clickBtn">KLIKNIJ (0.5 zł)</button>
        
        <div id="shop">
            <h3>Sklep</h3>

            <div id="buy-mode-selector">
    <span>Tryb zakupu: </span>
    <button onclick="setBuyMode(1)">x1</button>
    <button onclick="setBuyMode(10)">x10</button>
    <button onclick="setBuyMode(100)">x100</button>
    <button onclick="setBuyMode('max')">MAX</button>
    <strong id="current-mode">Aktualnie: x1</strong>
</div>
            
            <table id="building-table">
                <thead>
                    <tr>
                        <th>Budynek</th>
                        <th>Cena</th>
                        <th>Ilość</th>
                        <th>Akcja</th>
                    </tr>
                </thead>
                <tbody id="building-body">
                    <!-- Tutaj JavaScript będzie wstawiał zawartość -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Ładowanie skryptu na samym końcu, żeby strona działała poprawnie -->
    <script src="script.js"></script>
</body>
</html>
